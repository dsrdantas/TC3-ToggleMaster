name: TC3 - Analytics Service

on:
  push:
    branches: [main]
    paths:
      - 'microservices/analytics-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'microservices/analytics-service/**'
  workflow_dispatch:
    inputs:
      run_build:
        description: 'Run Build & Unit Test'
        required: false
        default: true
        type: boolean
      run_lint:
        description: 'Run Linter / Static Analysis'
        required: false
        default: true
        type: boolean
      run_security:
        description: 'Run Security Scan (SAST & SCA)'
        required: false
        default: true
        type: boolean

env:
  SERVICE_NAME: analytics-service
  SERVICE_PATH: microservices/analytics-service
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    name: Build & Unit Test
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_build == true || inputs.run_build == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -v || echo "No tests found"

  lint:
    name: Linter / Static Analysis
    needs: build-and-test
    if: >-
      ${{ always() &&
          (
            (github.event_name != 'workflow_dispatch' && needs.build-and-test.result == 'success') ||
            (github.event_name == 'workflow_dispatch' &&
             (inputs.run_lint == true || inputs.run_lint == 'true') &&
             (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped'))
          ) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 --max-line-length=120 .

  sca:
    name: Security Scan (SCA)
    needs: lint
    if: >-
      ${{ always() &&
          (
            (github.event_name != 'workflow_dispatch' && needs.lint.result == 'success') ||
            (github.event_name == 'workflow_dispatch' &&
             (inputs.run_security == true || inputs.run_security == 'true') &&
             (needs.lint.result == 'success' || needs.lint.result == 'skipped'))
          ) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: SCA - Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'microservices/analytics-service'
          severity: 'CRITICAL'
          exit-code: '1'

  sast:
    name: Security Scan (SAST - SonarCloud)
    needs: lint
    if: >-
      ${{ always() &&
          (
            (github.event_name != 'workflow_dispatch' && needs.lint.result == 'success') ||
            (github.event_name == 'workflow_dispatch' &&
             (inputs.run_security == true || inputs.run_security == 'true') &&
             (needs.lint.result == 'success' || needs.lint.result == 'skipped'))
          ) }}
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan (SAST)
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: microservices/analytics-service
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.

      - name: SonarCloud Critical Vulnerabilities Check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.request
          
          report_path = "microservices/analytics-service/.scannerwork/report-task.txt"
          server = os.environ.get("SONAR_HOST_URL", "https://sonarcloud.io").rstrip("/")
          token = os.environ["SONAR_TOKEN"]
          project_key = os.environ.get("SONAR_PROJECT_KEY")
          
          if not project_key:
            print("SONAR_PROJECT_KEY nao definido")
            raise SystemExit(1)
          
          ce_task_url = None
          with open(report_path, "r", encoding="utf-8") as f:
            for line in f:
              if line.startswith("ceTaskUrl="):
                ce_task_url = line.strip().split("=", 1)[1]
                break
          
          if not ce_task_url:
            print("ceTaskUrl nao encontrado em report-task.txt")
            raise SystemExit(1)
          
          def get_json(url: str):
            req = urllib.request.Request(url)
            auth = base64.b64encode(f"{token}:".encode()).decode()
            req.add_header("Authorization", f"Basic {auth}")
            with urllib.request.urlopen(req) as resp:
              return json.load(resp)
          
          status = None
          analysis_id = None
          for _ in range(60):
            data = get_json(ce_task_url)
            status = data["task"]["status"]
            if status in ("SUCCESS", "FAILED", "CANCELED"):
              analysis_id = data["task"].get("analysisId")
              break
            time.sleep(5)
          
          if status != "SUCCESS":
            print(f"SonarCloud task status: {status}")
            raise SystemExit(1)
          
          issues_url = (
            f"{server}/api/issues/search"
            f"?componentKeys={project_key}"
            f"&severities=CRITICAL"
            f"&types=VULNERABILITY"
            f"&resolved=false"
            f"&sinceLeakPeriod=true"
          )
          issues = get_json(issues_url)
          total = issues.get("total", 0)
          if total > 0:
            print(f"CRITICAL vulnerabilities found (new code): {total}")
            raise SystemExit(1)
          
          print("No CRITICAL vulnerabilities on new code.")
          PY

  docker-build-push:
    name: Docker Build & Push to ECR
    needs: [sca, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }} \
            microservices/analytics-service

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push to ECR
        run: |
          # Skip push if image tag already exists (handles re-runs with immutable tags)
          if aws ecr describe-images --repository-name analytics-service --image-ids imageTag=${{ steps.meta.outputs.short_sha }} 2>/dev/null; then
            echo "Image tag ${{ steps.meta.outputs.short_sha }} already exists in ECR, skipping push."
          else
            docker push ${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }}
          fi

  update-gitops:
    name: Update GitOps Manifests
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update deployment image tag
        run: |
          sed -i "s|image: .*analytics-service:.*|image: ${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }}|" \
            gitops/analytics-service/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/analytics-service/deployment.yaml
          git commit -m "chore: update analytics-service image to ${{ steps.meta.outputs.short_sha }}"
          # Retry loop to handle concurrent pushes from other service pipelines
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
